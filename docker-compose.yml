services:
  postgres:
    image: postgres:16-alpine
    container_name: api-naruto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: narutodb
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: api-naruto-backend
    container_name: api-naruto-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/narutodb
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    image: api-naruto-frontend
    container_name: api-naruto-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  postgres_data: